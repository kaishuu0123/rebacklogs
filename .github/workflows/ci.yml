name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Biome check
        run: yarn biome check .

  test:
    name: Test (RSpec)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rebacklogs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/rebacklogs_test
      SECRET_KEY_BASE: ci_secret_key_base_placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Install JS dependencies
        run: yarn install --frozen-lockfile
      - name: Build Vite assets
        run: yarn vite build --mode=test
      - name: Setup DB
        run: bundle exec rails db:migrate
      - name: Run RSpec
        run: bundle exec rspec
