name: Copy GHCR images to Docker Hub

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        tag:
          - v2.0.0
          - v3.0.0
          - v3.1.0
          - v3.2.0
          - v4.0.0
          - v4.1.0
          - v4.1.1
    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Copy image
        run: |
          crane copy \
            ghcr.io/${{ github.repository_owner }}/rebacklogs:${{ matrix.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/rebacklogs:${{ matrix.tag }}
